<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>35 Page 35 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="789D51B1-0926-40D3-86E5-25F47E9A322F"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.031px;top:46.635px;width:916.000px;height:47.225px;"><img src="images/image-28.png" alt="REžim: reakcija REžim: reakcija" style="width:916.000px;height:47.225px;"/></span></p><div style="position:absolute;left:53.031px;top:46.635px;width:916.000px;height:47.225px;"><span style="display:inline-block;position:absolute;left:2.000px;top:2.000px;width:912.000px;height:38.000px;"><img src="images/border-image-2.png" alt="border-image-2.png" style="position:absolute;left:0;top:0;width:912.000px;height:38.000px;"/></span><p class="p8 c1" style="position:absolute;left:4.000px;top:4.000px;"><span class="c17">REžim:</span><span class="c15"> reakcija</span></p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.000px;top:94.000px;width:916.000px;height:621.441px;"><img src="images/image-121.png" alt="Podešavanje nivoa zvuka, osetljivosti i inercije vizuelne reprezentacije zvuka se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Izvor&quot;.… Podešavanje nivoa zvuka, osetljivosti i inercije vizuelne reprezentacije zvuka se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Izvor&quot;.&#10;Nivo zvuka je prag koji nivo zvuka mora da pređe da bi izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su ignorisani. Ukoliko je potrebno, podesite ga prema nivou buke u vašem prostoru tako da se svetlosni panel ne uključuje kada niko ne govori. &#10;Osetljivost je osetljivost sistema na promenu nivoa zvuka. Ukoliko ga menjate ka većim vrednostima, sistem postaje osetljiviji, i moguće ga je lakše pobuditi. Pomerajući klizač ka manjim vrednostima, potreban je viši nivo zvuka da bi se uređaj pokrenuo, odnosno da bi se svetla upalila.&#10;Inercija predstavlja brzinu reakcije svetlosnog panela na zvučnu pobudu. &#10;Kada uključite senzor udaljenosti, u sekciji &quot;Izvor&quot; se pojavljuje klizač Raspon. Njime regulišete osetljivost svetlosnog prikaza na promenu udaljenosti prepreke od senzora udaljenost. Što je manja vrednost na klizaču, svetla na panelu će reagovati brže i više ispunjavati ekran.&#10;Podešavanje prikaza svetala na svetlosnom panelu se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Prikaz&quot;, a funkcije klizača u različitim  varijantama prikaza ekrana su:&#10;&quot;Duga&quot; - pomoću klizača Opadanje možete regulisati brzinu opadanja svetlosne reakcije na zvuk.&#10;&quot;Polja&quot; - pored klizača Opadanje pojavljuje se klizač Polja. Njime određujete u koliko raznobojnih polja će biti podeljen prikaz svetala na svetlosnom panelu. &#10;&quot;Vrh&quot; - pojavljuje se Opadanje i još dva klizača. Opadanje vrha određuje kojom brzinom će opadati vrh, odnosno crvena linija koja prikazuje maksimalnu postignutu jačinu zvuka. Zadržavanje vrha određuje koliko dugo će vrh stajati u mestu pre no što počne da opada niz svetlosni panel.&#10;&quot;Prozor&quot; - klizači Opadanje vrha i Zadržavanje vrha imaju istu funkciju kao u prethodnom slučaju, a pojam &quot;vrh&quot; se odnosi na belu liniju koja prikazuje nivo zvuka.&#10;Ukoliko promenite parametre nivoa zvuka, osetljivosti, intenziteta svetla ili opadanja, svoja podešavanja možete zapamtiti na način koji je opisan na strani 19." style="width:916.000px;height:621.441px;"/></span></p><div style="position:absolute;left:53.000px;top:94.000px;width:916.000px;height:621.441px;"><div style="position:absolute;left:4.000px;top:4.000px;width:431.300px;height:613.000px;"><p class="p3 c1" style="position:absolute;left:0;top:0;"><span class="c4 c14">Podešavanje nivoa zvuka, osetljivosti i inercije</span><span class="c4"> vizuelne </span></p><p class="p3" style="position:absolute;left:0;top:24.200px;">reprezentacije zvuka se vrši pomoću klizača koji se nalaze u </p><p class="p3 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4">donjoj polovini ekrana aplikacije, u sekciji </span><span class="c4 c8">&quot;Izvor&quot;</span><span class="c4">.</span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:92.600px;"><span class="c4">Nivo zvuka </span><span class="c6">je prag koji nivo zvuka mora da pređe da bi </span></p><p class="p3 c3" style="position:absolute;left:0;top:116.800px;">izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su </p><p class="p3 c3" style="position:absolute;left:0;top:141.000px;">ignorisani. Ukoliko je potrebno, podesite ga prema nivou </p><p class="p3 c3" style="position:absolute;left:0;top:165.200px;">buke u vašem prostoru tako da se svetlosni panel ne </p><p class="p3 p9 c1" style="position:absolute;left:0;top:189.400px;"><span class="c6">uključuje kada niko ne govori. </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:233.600px;"><span class="c4">Osetljivost </span><span class="c6">je osetljivost sistema na promenu nivoa zvuka. </span></p><p class="p3 c3" style="position:absolute;left:0;top:257.800px;">Ukoliko ga menjate ka većim vrednostima, sistem postaje </p><p class="p3 c3" style="position:absolute;left:0;top:282.000px;">osetljiviji, i moguće ga je lakše pobuditi. Pomerajući klizač </p><p class="p3 c3" style="position:absolute;left:0;top:306.200px;">ka manjim vrednostima, potreban je viši nivo zvuka da bi se </p><p class="p3 c3" style="position:absolute;left:0;top:330.400px;">uređaj pokrenuo, odnosno da bi se svetla upalila.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:374.600px;"><span cl je na zvuk.</p><p class="p3 c1" style="position:absolute;left:0;top:170.200px;"><span class="c4 c8">&quot;Polja&quot;</span><span class="c4"> - pored klizača Opadanje pojavljuje se klizač </span><span class="c4 c8">Polja</span><span class="c4">. </span></p><p class="p3" style="position:absolute;left:0;top:194.400px;">Njime određujete u koliko raznobojnih polja će biti </p><p class="p3" style="position:absolute;left:0;top:218.600px;">podeljen prikaz svetala na svetlosnom panelu. </p><p class="p3 c1" style="position:absolute;left:0;top:247.800px;"><span class="c4 c8">&quot;Vrh&quot;</span><span class="c4"> - pojavljuje se Opadanje i još dva klizača. </span><span class="c4 c8">Opadanje </span></p><p class="p3 c1" style="position:absolute;left:0;top:272.000px;"><span class="c4 c8">vrha</span><span class="c4"> određuje kojom brzinom će opadati vrh, odnosno </span></p><p class="p3" style="position:absolute;left:0;top:296.200px;">crvena linija koja prikazuje maksimalnu postignutu jačinu </p><p class="p3 c1" style="position:absolute;left:0;top:320.400px;"><span class="c4">zvuka. </span><span class="c4 c8">Zadržavanje vrha</span><span class="c4"> određuje koliko dugo će vrh </span></p><p class="p3" style="position:absolute;left:0;top:344.600px;">stajati u mestu pre no što počne da opada niz svetlosni </p><p class="p3" style="position:absolute;left:0;top:368.800px;">panel.</p><p class="p3 c1" style="position:absolute;left:0;top:395.000px;"><span class="c4 c8">&quot;Prozor&quot; </span><span class="c4">-</span><span class="c4 c8"> </span><span class="c4">klizači </span><span class="c4 c8">Opadanje vrha</span><span class="c4"> i </span><span class="c4 c8">Zadržavanje vrha</span><span class="c4"> </span></p><p class="p3 c1" style="position:absolute;left:0;top:419.200px;"><span class="c4">imaju istu funkciju kao u prethodnom slučaju, a pojam </span><span class="c4 c14">&quot;vrh&quot;</span><span class="c4"> </span></p><p class="p3 c1" style="position:absolute;left:0;top:443.400p
