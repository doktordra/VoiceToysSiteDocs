<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>20 Page 20 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="789D51B1-0926-40D3-86E5-25F47E9A322F"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:55.031px;top:111.861px;width:913.773px;height:561.413px;"><img src="images/image-74.png" alt="3-6: Nakon što ste pritiskom na taster &quot;REŽIM&quot; ušli u meni za izbor režima rada uređaja, režim vizuelne identifikacije nivoa zvuka birate pritiskom na taster &quot;Mikrofon&quot;. Pojaviće se ekran prikazan na prethodnoj strani, u čijem gornjem plavom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 15.… 3-6: Nakon što ste pritiskom na taster &quot;REŽIM&quot; ušli u meni za izbor režima rada uređaja, režim vizuelne identifikacije nivoa zvuka birate pritiskom na taster &quot;Mikrofon&quot;. Pojaviće se ekran prikazan na prethodnoj strani, u čijem gornjem plavom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 15.&#10;Vizuelna reprezentacija zvuka može biti analogna ili digitalna. Tasteri za izbor vizuelne reprezentacije zvuka &quot;Analogno&quot; i &quot;Digitalno&quot; se nalaze u sredini ekrana aplikacije. U analognom režimu sijaju svi stubići zajedno, a intenzitet sijanja zavisi od nivoa zvuka. U digitalnom režimu stubići uvek sijaju maksimalnim intenzitetom kada zvuk pređe nivo koji je definisan za svaki od njih, a osvetljavaju se jedan po jedan, u zavisnosti od nivoa zvuka. &#10;Podešavanje nivoa zvuka, osetljivosti i opadanja  u analognom, odnosno nivoa zvuka, osetljivosti i intenziteta svetla u digitalnom načinu vizuelne reprezentacije zvuka, se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Podešavanja&quot;.&#10;Nivo zvuka je prag koji nivo zvuka mora da pređe da bi izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su ignorisani. Ukoliko vam je potrebno, podesite ga prema nivou buke u vašem prostoru tako da se plavi stubić ne uključuje kada niko ne govori. &#10;Osetljivost je osetljivost sistema na promenu nivoa zvuka. Ukoliko ga menjate ka većim vrednostima, sistem postaje osetljiviji, i moguće ga je lakše pobuditi. Pomerajući klizač ka manjim vrednostima, potreban je viši nivo zvuka da bi se uređaj pokrenuo, odnosno da bi se svetla upalila.&#10;Opadanje određuje opadanje intenziteta svetla od plavog do sivog stubića.&#10;Intenzitet svetla podešava jačinu sijanja svetlosnih stubića. Što ga više pomerate ka većim vrednostima, svetlosni stubići će sijati jače.&#10;Ukoliko promenite parametre nivoa zvuka, osetljivosti, intenziteta svetla ili opadanja, svoja podešavanja možete zapamtiti na način koji je opisan na sledećoj strani." style="width:913.773px;height:561.413px;"/></span></p><div style="position:absolute;left:55.031px;top:111.861px;width:913.773px;height:561.413px;"><div style="position:absolute;left:4.000px;top:4.000px;width:430.242px;height:553.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">3-6: </span><span class="c6">Nakon što ste pritiskom na taster &quot;REŽIM&quot; ušli u meni </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim vizuelne identifikacije </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4 c14">nivoa zvuka</span><span class="c4"> </span><span class="c6">birate pritiskom na taster &quot;</span><span class="c4">Mikrofon&quot;</span><span class="c6">. Pojaviće </span></p><p class="p3 c3" style="position:absolute;left:0;top:72.600px;">se ekran prikazan na prethodnoj strani, u čijem gornjem </p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">plavom polju možete videti naziv uređaja i tastere za </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">informacije o sistemu i pomoć. Funkcija i način korišćenja </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">ovih tastera su opisani na strani 15.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:189.400px;"><span class="c6">Vizuelna reprezentacija zvuka može biti analogna ili </span></p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">digitalna. Tasteri za izbor vizuelne reprezentacije zvuka </p><p class="p3 p9 c1" style="position:absolute;left:0;top:237.800px;"><span class="c4">&quot;Analogno&quot;</span><span class="c6"> i </span><span class="c4">&quot;Digitalno&quot; </span><span class="c6">se nalaze u sredini ekrana </span></p><p class="p3 c3" style="position:absolute;left:0;top:262.000px;">aplikacije. U analognom režimu sijaju svi stubići zajedno, a </p><p class="p3 c3" style="position:absolute;left:0;top:286.200px;">intenzitet sijanja zavisi od nivoa zvuka. U digitalnom režimu </p><p class="p3 c3" style="position:absolute;left:0;top:310.400px;">stubići uvek sijaju maksimalnim intenzitetom kada zvuk </p><p class="p3 c3" style="position:absolute;left:0;top:334.600px;">pređe nivo koji je definisan za svaki od njih, a osvetljavaju </p><p class="p3 p9 c1" style="position:absolute;left:0;top:358.800px;"><span class="c6">se jedan po jedan, u zavisnosti od nivoa zvuka. </span></p><p class="p3 c1" style="position:absolute;left:0;top:403.000px;"><span class="c4 c14">Podešavanje nivoa zvuka, osetljivosti i opadanja  </span><span class="c4">u </span></p><p class="p3 c1" style="position:absolute;left:0;top:427.200px;"><span class="c4">analognom, odnosno </span><span class="c4 c14">nivoa zvuka, osetljivosti i intenziteta </span></p><p class="p3 c1" style="position:absolute;left:0;top:451.400px;"><span class="c4 c14">svetla</span><span class="c4"> u digitalnom načinu vizuelne reprezentacije zvuka, </span></p><p class="p3" style="position:absolute;left:0;top:475.600px;">se vrši pomoću klizača koji se nalaze u donjoj polovini </p><p class="p3 c1" style="position:absolute;left:0;top:499.800px;"><span class="c4">ekrana aplikacije, u sekciji </span><span class="c4 c8">&quot;Podešavanja&quot;</span><span class="c4">.</span></p></div><div style="position:absolute;left:479.531px;top:4.000px;width:430.242px;height:553.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">Nivo zvuka </span><span class="c6">je prag koji nivo zvuka mora da pređe da bi </span></p><p class="p3 c3" style="position:absolute;left:0;top:24.200px;">izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su </p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">ignorisani. Ukoliko vam je potrebno, podesite ga prema </p><p class="p3 c3" style="position:absolute;left:0;top:72.600px;">nivou buke u vašem prostoru tako da se plavi stubić ne </p><p class="p3 p9 c1" style="position:absolute;left:0;top:96.800px;"><span class="c6">uključuje kada niko ne govori. </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:141.000px;"><span class="c4">Osetljivost </span><span class="c6">je osetljivost sistema na promenu nivoa zvuka. </span></p><p class="p3 c3" style="position:absolute;left:0;top:165.200px;">Ukoliko ga menjate ka većim vrednostima, sistem postaje </p><p class="p3 c3" style="position:absolute;left:0;top:189.400px;">osetljiviji, i moguće ga je lakše pobuditi. Pomerajući klizač </p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">ka manjim vrednostima, potreban je viši nivo zvuka da bi se </p><p class="p3 c3" style="position:absolute;left:0;top:237.800px;">uređaj pokrenuo, odnosno da bi se svetla upalila.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:282.000px;"><span class="c4">Opadanje</span><span class="c6"> određuje opadanje intenziteta svetla od plavog </span></p><p class="p3 c3" style="position:absolute;left:0;top:306.200px;">do sivog stubića.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:350.400px;"><span class="c4">Intenzitet svetla</span><span class="c6"> podešava jačinu sijanja svetlosnih </span></p><p class="p3 c3" style="position:absolute;left:0;top:374.600px;">stubića. Što ga više pomerate ka većim vrednostima, </p><p class="p3 c3" style="position:absolute;left:0;top:398.800px;">svetlosni stubići će sijati jače.</p><p class="p3 c1" style="position:absolute;left:0;top:443.000px;"><span class="c6">Ukoliko promenite parametre nivoa zvuka, osetljivosti, </span></p><p class="p3 c1" style="position:absolute;left:0;top:467.200px;"><span class="c6">intenziteta svetla ili opadanja, </span><span class="c4 c13">svoja</span><span class="c4 c8"> </span><span class="c4 c13">podešavanja možete </span></p><p class="p3 c1" style="position:absolute;left:0;top:491.400px;"><span class="c4 c13">zapamtiti</span><span class="c4 c14"> </span><span class="c4">na način koji je opisan na sledećoj strani.</span></p></div></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.031px;top:47.000px;width:916.000px;height:47.225px;"><img src="images/image-28.png" alt="režim mikrofon: podešavanja režim mikrofon: podešavanja" style="width:916.000px;height:47.225px;"/></span></p><div style="position:absolute;left:53.031px;top:47.000px;width:916.000px;height:47.225px;"><span style="display:inline-block;position:absolute;left:2.000px;top:2.000px;width:912.000px;height:38.000px;"><img src="images/border-image-2.png" alt="border-image-2.png" style="position:absolute;left:0;top:0;width:912.000px;height:38.000px;"/></span><p class="p8 c1" style="position:absolute;left:4.000px;top:4.000px;"><span class="c17">režim mikrofon:</span><span class="c15"
