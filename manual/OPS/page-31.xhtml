đaja i prikazati vrednosti po kojima on trenutno radi. &#10;U gornjem crvenom polju ekrana aplikacije možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. &#10;Pritiskom na simbol zupčanika u gornjem crvenom polju pristupićete ekranu sa informacijama o uređaju, gde možete videti da li je Vaš uređaj ažuriran, odnosno da li je u njega učitana poslednja verzija softvera. &#10;Možete podesiti i jačinu zvuka kojom će se emitovati reakcije za tačne i netačne odgovore, kao i jačinu svetla koje emituje svetlosni panel.&#10; Pritiskom na bilo koji deo ekrana osenčen sivom bojom se vraćate na ekran za uređaj Jump uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png .&#10;Pritiskom na simbol znaka pitanja pojaviće se tekst koji će Vam pomoći da se podsetite osnovnih funkcija Jump uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png  aplikacije . Tekst možete pomerati na dole kako bi ga pročitali do kraja. U dnu ekrana se nalazi taster &quot;Pogledaj video&quot;. Pritiskom na ovaj taster ćete pristupiti detaljnom video uputstvu koje će Vam prikazati kompletno uputstvo za korišćenje Vašeg uređaja Jump uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png .&#10;Pritiskom na taster &quot;X&quot; vraćate se na ekran uređaja Jump uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png , u onom režimu u kom ste ga prethodno koristili." style="width:912.000px;height
