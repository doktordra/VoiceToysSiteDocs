<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>6 Page 6 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="05EB6E5A-16A3-4439-A504-C98B1AFE4C4E"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:54.919px;top:47.000px;width:913.773px;height:59.738px;"><img src="images/image-10.png" alt="UPOZORENJA UPOZORENJA" style="width:913.773px;height:59.738px;"/></span></p><div style="position:absolute;left:54.919px;top:47.000px;width:913.773px;height:59.738px;"><span style="display:inline-block;position:absolute;left:-2.000px;top:-2.000px;width:917.773px;height:38.000px;"><img src="images/border-image-3.png" alt="border-image-3.png" style="position:absolute;left:0;top:0;width:917.773px;height:38.000px;"/></span><p class="p8" style="position:absolute;left:0;top:0;">UPOZORENJA</p></div><table class="s1" style="position:absolute;left:63.841px;top:117.830px;width:879.243px;margin-left:0;border-collapse:collapse;"><colgroup><col style="width:18.6%"/><col style="width:81.4%"/></colgroup><tr style="height:35.697px;"><td class="tc1"><p class="p12 p13" style="position:absolute;left:30.681px;top:8.000px;">Oznaka / Sign</p></td><td class="tc2"><p class="p12 p13" style="position:absolute;left:324.793px;top:8.000px;">Značenje</p></td></tr><tr style="height:43.189px;"><td class="tc3"><p class="p12 p13 c1" style="position:absolute;left:27.206px;top:9.000px;"><span class="c11">⚠️ </span><span class="c10">Upozorenje</span></p></td><td class="tc4"><p class="p12 p14" style="position:absolute;left:2.000px;top:12.000px;">Pokazuje mogućnost ozbiljne fizičke povrede ako se uputstva iz ovog priručnika ne prate pravilno.</p></td></tr><tr style="height:36.138px;"><td class="tc5"><p class="p12 p13 c1" style="position:absolute;left:49.671px;top:8.000px;"><span class="c11">▲ </span><span class="c10">Oprez</span></p></td><td class="tc6"><p class="p12 p14" style="position:absolute;left:2.000px;top:8.000px;">Pokazuje mogućnost fizičke povrede ili materijalne štete ako se uputstva ne prate pravilno.</p></td></tr><tr style="height:59.642px;"><td class="tc3"><p class="p12 p13 c1" style="position:absolute;left:27.979px;top:17.000px;"><span class="c11">🚫 </span><span class="c10">Zabranjeno</span></p></td><td class="tc4"><p class="p12 p14" style="position:absolute;left:2.000px;top:20.000px;">Precrtani krug pokazuje da je nešto zabranjeno. Objašnjenje zabrane nalazi se pored simbola.</p></td></tr><tr style="height:28.860px;"><td class="tc5"><p class="p12 p15" style="position:absolute;left:61.501px;top:2.000px;">🚫📦</p></td><td class="tc6"><p class="p12 p16" style="position:absolute;left:2.000px;top:4.000px;">Nije dozvoljeno rasklapanje!</p></td></tr><tr style="height:44.460px;"><td class="tc3"><p class="p12 p15 c1" style="position:absolute;left:71.501px;top:10.000px;"><span class="c10">❗</span></p></td><td class="tc4"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:2.000px;"><span class="c12">OPREZ:</span><span class="c10"> Baterija u uređaju nije zamenjiva i njena zamena može izazvati rizik. Ne pokušavajte da je </span></p><p class="p12 p14" style="position:absolute;left:2.000px;top:22.000px;">zamenite ili isključite.</p></td></tr><tr style="height:36.138px;"><td class="tc5"><p class="p12 p15 c1" style="position:absolute;left:71.501px;top:6.000px;"><span class="c10">❗</span></p></td><td class="tc6"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:8.000px;"><span class="c12">OPREZ:</span><span class="c10"> Proizvodi nisu namenjeni za upotrebu u zapaljivim ili eksplozivnim okruženjima.</span></p></td></tr><tr style="height:52.591px;"><td class="tc3"><p class="p12 p15 c1" style="position:absolute;left:71.501px;top:14.000px;"><span class="c10">⚡</span></p></td><td class="tc4"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:6.000px;"><span class="c12">UPOZORENJE:</span><span class="c10"> Postoji rizik od eksplozije ili povrede ako je uređaj izložen provodnim materijalima, </span></p><p class="p12 p14" style="position:absolute;left:2.000px;top:26.000px;">tečnosti, vatri ili visokoj temperaturi (iznad 40°C).</p></td></tr><tr style="height:36.138px;"><td class="tc5"><p class="p12 p15 c1" style="position:absolute;left:71.501px;top:6.000px;"><span class="c10">❗</span></p></td><td class="tc6"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:8.000px;"><span class="c12">UPOZORENJE:</span><span class="c10"> Ne koristite uređaj u vlažnom okruženju. Zaštitite ga od prodora tečnosti.</span></p></td></tr><tr style="height:52.591px;"><td class="tc3"><p class="p12 p15 c1" style="position:absolute;left:74.001px;top:19.000px;"><span class="c10">▲</span></p></td><td class="tc4"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:6.000px;"><span class="c12">UPOZORENJE:</span><span class="c10"> Uređaj mora biti napajan eksternim napajanjem koje je usklađeno sa IEC/EN 62368-1 </span></p><p class="p12 p14" style="position:absolute;left:2.000px;top:26.000px;">standardom i ispunjava ES1 i PS1 zahteve.</p></td></tr><tr style="height:69.044px;"><td class="tc5"><p class="p12 p15" style="position:absolute;left:61.501px;top:22.000px;">🚫🔌</p></td><td class="tc6"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:15.000px;"><span class="c12">UPOZORENJE:</span><span class="c10"> Opasnost od strujnog udara ili požara. Uređaj punite isključivo isporučenim USB </span></p><p class="p12 p14" style="position:absolute;left:2.000px;top:35.000px;">punjačem. USB kabl mora biti povezan na sertifikovani laptop/PC ili sertifikovani mini USB punjač.</p></td></tr><tr style="height:44.070px;"><td class="tc7"><p class="p12 p15" style="position:absolute;left:61.501px;top:10.000px;">🚫🛠️</p></td><td class="tc8"><p class="p12 p14 c1" style="position:absolute;left:2.000px;top:2.000px;"><span class="c12">UPOZORENJE:</span><span class="c10"> NE otvarajte kućište uređaja. Ukoliko se utvrdi da je kućište otvoreno, garancija prestaje </span></p><p class="p12 p14" style="position:absolute;left:2.000px;top:22.000px;">da važi.</p></td></tr></table><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:780.019px;top:39.613px;width:179.125px;height:31.812px;"><img src="images/image-20.png" alt="VoiceToysLogo.png" style="width:179.125px;height:31.812px;"/></span></p></div></body></html>
