<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>18 Page 18 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="05EB6E5A-16A3-4439-A504-C98B1AFE4C4E"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:55.919px;top:109.966px;width:912.225px;height:585.000px;"><img src="images/image-64.png" alt="3 - 4: Funkcije mobilne aplikacije za uređaj Spread… 3 - 4: Funkcije mobilne aplikacije za uređaj Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png  &#10;Biranje režima rada i fina podešavanja uređaja se vrše pomoću aplikacije VoiceToys. Pre nego što pokrenete mobilnu aplikaciju, obavezno uključite plavi stubić jer se u njemu nalazi bluetooth prijemnik pomoću kojeg uređaj komunicira sa telefonom. Uređaji se povezuju automatski, bez ikakvog dodatnog podešavanja i reaguju na zvuk odmah nakon uključivanja. &#10;Nakon što uključite uređaj, na početnom ekranu aplikacije (prikazan na strani 7) odaberite opciju &quot;Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png &quot; kada se njen simbol oboji zelenom bojom. Ukoliko je povezivanje uspešno, logotip plavog stubića će trepnuti dva puta, a mobilna aplikacija će preuzeti podešavanja uređaja i prikazati vrednosti prema kojima on trenutno reaguje. &#10;U gornjem plavom polju ekrana aplikacije možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. &#10;Pritiskom na simbol zupčanika u gornjem plavom polju pristupićete ekranu sa informacijama o uređaju, gde možete videti da li je Vaš uređaj ažuriran, odnosno da li je u njega učitana poslednja verzija softvera. &#10;Pritiskom na bilo koji deo ekrana osenčen sivom bojom se vraćate na ekran za uređaj &quot;Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png &quot;.&#10;Pritiskom na simbol znaka pitanja pojaviće se ekran sa tekstom koji će Vam pomoći da se podsetite osnovnih funkcija &quot;Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png &quot; aplikacije (slika desno). Tekst možete pomerati na dole kako bi ga pročitali do kraja. U dnu ekrana se nalazi taster &quot;Pogledaj video&quot;. Pritiskom na ovaj taster ćete pristupiti detaljnom video uputstvu koje će Vam prikazati kompletno uputstvo za korišćenje Vašeg uređaja &quot;Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png &quot;.&#10;Pritiskom na taster &quot;X&quot; vraćate se na ekran uređaja &quot;Spread uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png &quot;, u onom režimu u kom ste ga prethodno koristili." style="width:912.225px;height:585.000px;"/></span></p><div style="position:absolute;left:55.919px;top:109.966px;width:912.225px;height:585.000px;"><div style="position:absolute;left:4.000px;top:4.000px;width:429.507px;height:577.000px;"><p class="p3 p9" style="position:absolute;left:
