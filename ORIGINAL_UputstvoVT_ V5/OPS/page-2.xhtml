vog jedinstvenog sistema!" style="width:610.148px;height:484.791px;"/></span></p><div style="position:absolute;left:359.883px;top:220.169px;width:610.148px;height:484.791px;"><p class="p3" style="position:absolute;left:0;top:0;">Namenjen je za rad u logopedskoj i defektološkoj praksi, ali se može koristiti u radu </p><p class="p3" style="position:absolute;left:0;top:24.200px;">sa korisnicima svih uzrasta i nivoa razvoja.</p><p class="p3" style="position:absolute;left:0;top:68.400px;">Razvijan je sa ljubavlju i željom da se uklopi u proces rada tako da ga ne ometa, već </p><p class="p3" style="position:absolute;left:0;top:92.600px;">da motiviše, ubrza napredovanje i olakša rad terapeuta.</p><p class="p3" style="position:absolute;left:0;top:136.800px;">Dizajniran je da bude lak za upotrebu, vizuelno sveden, jednostavnih oblika i jasnih, </p><p class="p3" style="position:absolute;left:0;top:161.000px;">živih boja, neobičan, ali prirodan i human. Napravljen je od neškodljivih, kvalitetnih </p><p class="p3" style="position:absolute;left:0;top:185.200px;">materijala.</p><p class="p3" style="position:absolute;left:0;top:229.400px;">Kontroliše se bežično, originalnom aplikacijom razvijenom za Android i iOS uređaje.</p><p class="p3" style="position:absolute;left:0;top:273.600px;">Zasnovan je na mikrokontrolerima kojima se veoma lako, bežično ažurira operativni </p><p class="p3" style="position:absolute;left:0;top:297.800px;">sistem. Zahvaljujući tome,  uređaji se mogu modifikovati i obogatiti dodatnim </p><p class="p3" style="position:absolute;left:0;top:322.000px;">funkcijama prema zahtevima korisnika. Pozivamo vas da svojim idejama učestvujete </p><p class="p3" style="position:absolute;left:0;top:346.200px;">u razvoju i napretku ovog jedinstvenog sistema!</p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:359.883px;top:188.760px;width:610.148px;height:22.673px;"><img src="images/image-7.png" alt="Sistem Voice Toys je napravljen sa željom da ga korisnici zavole Sistem Voice Toys je napravljen sa željom da ga korisnici zavole" style="width:610.148px;height:22.673px;"/></span></p><div style="position:absolute;left:359.883px;top:188.760px;width:610.148px;height:22.673px;"><p class="p7" style="position:absolute;left:0;top:0;">Sistem Voice Toys je napravljen sa željom da ga korisnici zavole</p></div></div></body></html>
