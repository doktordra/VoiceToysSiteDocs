skom na taster &quot;Ritmički obrazac&quot;. Pojaviće se ekran prikazan na slici desno, u čijem gornjem crvenom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 26.&#10;U srednjem delu ekrana se nalazi taster Smer koji određuje u kom smeru će se kretati bela linija.&#10;Podešavanje uređaja se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Podešavanja&quot;.&#10;Na klizaču sa oznakama Lako-Srednje-Teško biramo širinu linija čime igraču otežavamo ili olakšavamo zadatak. Pored ovog klizača se nalazi taster sa oznakom   JumpY ritmički obrazac.jpg   čijim aktiviranjem se igra resetuje i vraća na početak.&#10;Brzina predstavlja brzinu kretanja bele linije. Njenim podešavanjem  igraču otežavamo ili olakšavamo zadatak.&#10;Osetljivost predstavlja osetljivost sistema na nagli skok u nivou zvuka. Ovaj nagli skok se izaziva proizvođenjem nekog glasnog, oštrog zvuka - tapšanja, udarom noge o pod, olovke u sto, lopte u pod, udarca u bubanj itd. Više informacija o načinu igranja možete pronaći pritiskom na simbol znaka pitanja, u desnom delu gornjeg crvenog polja.&#10;Intenzitet svetla podešava jačinu sijanja ekrana, ovoj funkciji pristupate na taster zupčanika u gornjem crvenom polju.&#10;Ukoliko promenite neki od parametara  svoja podešavanja možete zapamtiti i njima pristupiti na način koji je opisan na strani 19.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg crvenog polja ekrana aplikacije." style="width:918.000px;height:609.643px;"/></span></p><div style="position:absolute;left:53.000px;top:94.000px;width:918.000px;height:609.643px;"><div style="position:absolute;left:4.000px;top:4.000px;width:432.250px;height:602.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">4-4-5: </span><span class="c6">Nakon što ste pritiskom na taster </span><span class="c4">&quot;REŽIM&quot;</span><span class="c6"> ušli u </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">meni za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim Prepoznavanje i </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4 c14">ponavljanje ritmičkih obrazaca</span><span class="c4"> </span><span class="c6">birate pritiskom na taster </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:72.600px;"><span class="c4">&quot;Ritmički obrazac&quot;</span><span class="c6">. Pojaviće se ekran prikazan na slici </span></p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">desno, u čijem gornjem crvenom polju možete videti naziv </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">uređaja i tastere za informacije o sistemu i pomoć. Funkcija </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">i način korišćenja ovih tastera su opisani na strani 26.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:189.400px;"><span class="c6">U srednjem delu ekrana se nalazi taster </span><span class="c4">Smer </span><span class="c6">koji određuje </span></p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">u kom smeru će se kretati bela linija.</p><p class="p3 c1" style="position:absolute;left:0;top:257.800px;"><span class="c4 c14">Podešavanje uređaja </span><span class="c4">se vrši pomoću klizača koji se nalaze u </span></p><p class="p3 c1" style="position:absolute;left:0;top:282.000px;"><span class="c4">donjoj polovini ekrana aplikacije, u sekciji </span><span class="c4 c8">&quot;Podešavanja&quot;</span><span class="c4">.</span></p><p class="p3 c1" style="position:absolute;left:0;top:326.200px;"><span class="c4">Na klizaču sa oznakama </span><span class="c4 c8">Lako-Srednje-Teško</span><span class="c4"> biramo širinu </span></p><p class="p3" style="
