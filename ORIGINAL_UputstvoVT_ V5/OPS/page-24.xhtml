jedne serije. Možemo odrediti da se upali samo jedan, pa sve do svih pet stubića. Kada se jednom podesi, ovaj parametar ostaje isti u svim serijama.&#10;Trajanje prikaza označava vreme tokom kog će stubići biti upaljeni. Vreme je izraženo u sekundama.&#10;Trajanje pauze označava vreme tokom kog će stubići biti ugašeni između dve serije. Vreme je izraženo u sekundama.&#10;Intenzitet svetla određuje jačinu svetla kojim će stubići biti osvetljeni.&#10;Ukoliko promenite parametre nivoa zvuka, osetljivosti, intenziteta svetla ili opadanja, svoja podešavanja možete zapamtiti na način koji je opisan na strani 19.&#10;Ispod klizača za podešavanje parametara igre nalaze se taster PLAY  SpreadY memorija 1.jpg , REPEAT  SpreadY memorija 2.jpg  i STRELICA  SpreadY memorija 2.jpg . Njihova namena je objašnjena na sledećoj strani.&#10;U donjem plavom polju ekrana aplikacije je taster &quot;Preseti&quot;, čija je upotreba opisana na strani 19. Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg plavog polja ekrana aplikacije." style="width:914.000px;height:605.402px;"/></span></p><div style="position:absolute;left:55.031px;top:118.861px;width:914.000px;height:605.402px;"><div style="position:absolute;left:4.000px;top:4.000px;width:430.350px;height:597.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">3-7: </span><span class="c6">Nakon što ste pritiskom na taster </span><span class="c4">&quot;REŽIM&quot;</span><span class="c6"> ušli u meni </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim igre memorije i učenja </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4 c14">sabiranja</span><span class="c4"> </span><span class="c6">birate pritiskom na taster &quot;</span><span class="c4">Memori
