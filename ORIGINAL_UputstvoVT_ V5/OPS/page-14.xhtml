činje da reaguje vibracijom ili svetlom. Ako birate veće vrednosti, za reakciju će biće potreban viši nivo zvuka. Manje vrednosti će dati reakciju i na najtiše zvukove u prostoru.&#10;Osetljivost određuje intenzitet reakcije uređaja na promenu nivoa zvuka. Ukoliko ga menjate ka manjim vrednostima, reakcija vibracije ili svetla na promenu zvuka će biti blaža. Što su vrednosti više, potreban je veći nivo zvuka da bi uređaj vibrirao ili sijao jačim intenzitetom.&#10;Kašnjenje je vreme odlaganja reakcije svetlom ili vibracijom na zvučnu pobudu.&#10;Pritiskom na taster &quot;Preseti&quot; u donjem levom uglu ekrana, vraćate se na ekran koji je opisan na prethodnoj strani i koji je identičan klikom na sekciju &quot;Izaberite ili kreirajte preset&quot;.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg žutog polja ekrana aplikacije." style="width:914.225px;height:594.000px;"/></span></p><div style="position:absolute;left:53.919px;top:112.966px;width:914.225px;height:594.000px;"><div style="position:absolute;left:4.000px;top:4.000px;width:430.457px;height:586.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">Pritiskom na taster &quot;Kontrole&quot; </span><span class="c6">koji se nalazi u donjem </span></p><p class="p3 c3" style="position:absolute;left:0;top:24.200px;">levom uglu ekrana se vraćate na početni ekran u čijem </p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">donjem delu će se prikazati klizači sa kontrolama za </p><p class="p3 c3" style="position:absolute;left:0;top:72.600px;">podešavanje nivoa zvuka, osetljivosti i kašnjenja reakcije </p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">Vašeg uređaja &quot;Vibe<span style="display:inline-block;width:9.135px;height:13.011px;"/>&quot;. Prikaz ovog ekrana možete videti </p><p class="p3 p9 c1" style="position:absolute;left:0;top:121.000px;"><span class=
