 desno, u čijem gornjem crvenom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 26.&#10;Podešavanje osetljivosti uređaja na zvuk se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Podešavanja&quot;.&#10;Osetljivost predstavlja osetljivost sistema na nagli skok u nivou zvuka. Ovaj nagli skok se izaziva proizvođenjem nekog glasnog, oštrog zvuka - tapšanja, udarom noge o pod, olovke u sto, lopte u pod, udarca u bubanj itd. Više informacija o načinu igranja možete pronaći pritiskom na simbol znaka pitanja, u desnom delu gornjeg crvenog polja.&#10;Resetuj je dugme označeno simbolom  JumpY ritmički obrazac.jpg . Pritiskom na ovaj taster vraćate igru u početni položaj.&#10;Intenzitet svetla podešava jačinu sijanja ekrana, ovoj funkciji pristupate na taster zupčanika u gornjem crvenom polju.&#10;Ukoliko promenite parametre nivoa zvuka, osetljivosti ili boje, svoja podešavanja možete zapamtiti i njima pristupiti na način koji je opisan na strani 19.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg crvenog polja ekrana aplikacije." style="width:925.773px;height:613.628px;"/></span></p><div style="position:absolute;left:53.000px;top:107.000px;width:925.773px;height:613.628px;"><div style="position:absolute;left:4.000px;top:4.000px;width:435.942px;height:606.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">4-4-3: </span><span class="c6">Nakon što ste pritiskom na taster </span><span class="c4">&quot;REŽIM&quot;</span><span class="c6"> ušli u </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">meni za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim Igra tapšanja</span><span class="c4"> </span></p><p class="p3 p9 c1" style="position:absolu
