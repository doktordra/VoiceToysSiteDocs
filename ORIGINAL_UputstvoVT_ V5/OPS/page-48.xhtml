na kratko upaliti svetlo na onom zvučniku iz kojeg dolazi zvuk. Svetlo za pomoć će biti aktivno sve dok ga ne isključite ponovnim pritiskom na taster.&#10;- u donjem desnom uglu se nalazi taster za resetovanje oba indikatora vremena.&#10;U donjem delu ekrana se nalaze:&#10;- klizač za regulaciju i indikaciju jačine zvuka koju zvučnici proizvode. Početna vrednost je 25, moguće je pojačati do 30. Pojačavanje ili utišavanje zvuka utiče na sve zvučnike podjednako.&#10;- pet polja sa slikama životinja, uokvirenih bojama koje odgovaraju zvučnicima koja služe za eimitovanje zvuka. Kada su zvučnici uključeni, prikazana su samo polja aktivnih zvučnika. Pritiskom na sliku u polju određene boje, odgovarajući zvuk se čuje iz zvučnika u boji polja koje je pritisnuto. U slučaju potrebe možete ponovo emitovati isti zvuk bez uticaja na merenje vremena. &#10;" style="width:913.000px;height:598.000px;"/></span></p><div style="position:absolute;left:55.258px;top:94.861px;width:913.000px;height:598.000px;"><div style="position:absolute;left:4.000px;top:4.000px;width:429.875px;height:590.000px;"><p class="p3 p9" style="position:absolute;left:0;top:0;">5 - 5: Funkcije mobilne aplikacije</p><p class="p3 c3" style="position:absolute;left:0;top:44.200px;">Nakon što uključite uređaj, na početnom ekranu aplikacije </p><p class="p3 c3" style="position:absolute;left:0;top:68.400px;">(prikazan na strani 7) odaberite opciju &quot;Space<span style="display:inline-block;width:9.135px;height:13.011px;"/>&quot; kada se </p><p class="p3 c3" style="position:absolute;left:0;top:92.600px;">njen simbol oboji zelenom bojom. Ukoliko je povezivanje </p><p class="p3 c3" style="position:absolute;left:0;top:116.800px;">uspešno, svetla na zvučnicima će se ugasiti i oni su spremni </p><p class="p3 c3" style="position:absolute;left:0;top:141.000px;">za rad. </p><p class="p3 c3" style="position:absolute;left:0;top:185.200px;">U gornjem zelenom polju ekrana aplikacije možete videti </p><p class="p3 c3" style="positi
