aviće se ekran prikazan na slici desno, u čijem gornjem crvenom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 26.&#10;U srednjem delu ekrana se nalazi slika koja pokazuje u kom režimu rada se nalazi uređaj.&#10;Podešavanje uređaja se vrši pomoću klizača koji se nalaze u donjoj polovini ekrana aplikacije, u sekciji &quot;Podešavanja&quot;.&#10;Na klizaču sa oznakama Prag formanata biramo prag koji nivo zvuka mora da pređe da bi izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su ignorisani.&#10;Na klizaču sa oznakama Prag sibilanata biramo prag koji nivo zvuka mora da pređe da bi izazvao svetlosnu reakciju. Zvukovi ispod ovog nivoa su ignorisani.&#10;Osetljivost je osetljivost sistema na promenu nivoa zvuka. Ukoliko ga menjate ka većim vrednostima, sistem postaje osetljiviji, i moguće ga je lakše pobuditi. Pomerajući klizač ka manjim vrednostima, potreban je viši nivo zvuka da bi se uređaj pokrenuo, odnosno da bi se svetla upalila.&#10;Intenzitet svetla podešava jačinu sijanja ekrana, ovoj funkciji pristupate na taster zupčanika u gornjem crvenom polju.&#10;Ukoliko promenite neki od parametara  svoja podešavanja možete zapamtiti i njima pristupiti na način koji je opisan na strani 19.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg crvenog polja ekrana aplikacije." style="width:918.000px;height:621.535px;"/></span></p><div style="position:absolute;left:53.000px;top:94.000px;width:918.000px;height:621.535px;"><div style="position:absolute;left:4.000px;top:4.000px;width:432.250px;height:614.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">4-4-6: </span><span class="c6">Nakon što ste pritiskom na taster </span><span class="c4">&quot;REŽIM&quot;</span><span class="c6"> ušli u </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">meni za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim Fonetika - </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4 c14">vežbanje formanata i sibilanata</span><span class="c4"> </span><span class="c6">birate pritiskom na taster </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:72.600px;"><span class="c4">&quot;Fonetika&quot;</span><span class="c6">. Pojaviće se ekran prikazan na slici desno, u </span></p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">čijem gornjem crvenom polju možete videti naziv uređaja i </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">tastere za informacije o sistemu i pomoć. Funkcija i način </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">korišćenja ovih tastera su opisani na strani 26.</p><p class="p3 c3" style="position:absolute;left:0;top:189.400px;">U srednjem delu ekrana se nalazi slika koja pokazuje u kom </p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">režimu rada se nalazi uređaj.</p><p class="p3 c1" style="position:absolute;left:0;top:257.800px;"><span class="c4 c14">Podešavanje uređaja </span><span class="c4">se vrši pomoću klizača koji se nalaze u </span></p><p class="p3 c1" style="position:absolute;left:0;top:282.000px;"><span class="c4">donjoj polovini ekrana aplikacije, u sekciji </span><span class="c4 c8">&quot;Podešavanja&quot;</span><span class="c4">.</span></p><p class="p3 c1" style="position:absolute;left:0;top:326.200px;"><span class="c4">Na klizaču sa oznakama </span><span class="c4 c8">Prag formanata</span><span class="c4"> biramo prag koji </span></p><p class="p3" style="position:absolute;left:0;top:350.400px;">nivo zvuka mora da pređe da bi izazvao svetlosnu reakciju. </p><p class="p3" style="position:absolute;left:0;top:374.600px;">Zvukovi ispod ovog nivoa su ignorisani.</p><p class="p3 c1" style="position:absolute;lef ss="c4 c8"> </span></p><p class="p21 c13" style="position:absolute;left:0;top:257.800px;">podešavanja možete </p><p class="p21 c13" style="position:absolute;left:0;top:282.000px;">zapamtiti i njima pristupiti </p><p class="p3" style="position:absolute;left:0;top:306.200px;">na način koji je opisan na </p><p class="p3" style="position:absolute;left:0;top:330.400px;">strani 19.</p><p class="p3 c1" style="position:absolute;left:0;top:374.600px;"><span class="c4">Uvek se možete vratiti na </span></p><p class="p3 c1" style="position:absolute;left:0;top:398.800px;"><span class="c4">početni ekran </span><span class="c4 c8">&quot;VoiceToys&quot;</span><span class="c4"> </span></p><p class="p3" style="position:absolute;left:0;top:423.000px;">aplikacije pritiskom na </p><p class="p3" style="position:absolute;left:0;top:447.200px;">taster sa slikom kućice, koji </p><p class="p3" style="position:absolute;left:0;top:471.400px;">se nalazi u sredini donjeg </p><p class="p3" style="position:absolute;left:0;top:495.600px;">crvenog polja ekrana </p><p class="p3" style="position:absolute;left:0;top:519.800px;">aplikacije.</p></div></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:752.000px;top:562.000px;width:219.000px;height:54.000px;"><img src="images/image-134.png" alt="Prikaz ekrana nakon aktiviranja režima Fonetika Prikaz ekrana nakon aktiviranja režima Fonetika" style="width:219.000px;height:54.000px;"/></span></p><div style="position:absolute;left:752.000px;top:562.000px;width:219.000px;height:54.000px;"><p class="p3 p20" style="position:absolute;left:13.866px;top:12.000px;">Prikaz ekrana nakon aktiviranja </p><p class="p3 p20" style="position:absolute;left:60.045px;top:32.900px;">režima Fonetika</p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:751.715px;top:107.000px;width:216.285px;height:455.000px;filter:drop-shadow(1.000px 2.000px 3.000px rgba(0,0,0,0.600));"><img src="images/JumpY_fonetika.jpg" alt="JumpY fonetika.jpg" style="width:216.285px;height:455.000px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:888.124px;top:50.333px;width:82.180px;height:27.096px;"><img src="images/JumpYAsset_2.png" alt="JumpYAsset 2.svg" style="width:82.180px;height:27.096px;"/></span></p></div></body></html>
