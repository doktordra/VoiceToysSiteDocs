57.127px;width:407.902px;height:22.673px;"><p class="p7" style="position:absolute;left:0;top:0;">VoiceToys nisu igračke, iako se tako zovu.</p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.031px;top:199.692px;width:916.000px;height:534.519px;"><img src="images/image-9.png" alt="VoiceToys uređaje nemojte davati deci na samostalno korišćenje!… VoiceToys uređaje nemojte davati deci na samostalno korišćenje!&#10;Svi VoiceToys uređaji su napravljeni od neškodljivih materijala i bez oštrih ivica kako bi se minimizovala opasnost od povreda. Uređaji su namenjeni da njima rukuju terapeuti. Osim uređaja Vibe uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png , koji proizvodi vibracije i namenjen je da ga korisnik dodiruje, ostale uređajte nemojte davati korisnicima u ruke kako bi se izbegla slučajna oštećenja. Posebno obratite pažnju na zvučnike iz sistema Space uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png , jer su njihove emitujuće površine napravljene od mekanog drveta. Hvatajte ih i držite isključivo za plastični deo! &#10;Napomena o sigurnosti i odgovornosti korisnika&#10;Ovo uputstvo je namenjeno da vam pomogne u pravilnoj i sigurnoj upotrebi ovog elektronskog uređaja. Pre korišćenja uređaja, pažljivo pročitajte ovo uputstvo i pridržavajte se svih navedenih smernica. Proizvođač ne snosi odgovornost za nepropisnu upotrebu uređaja ili posledice koje mogu proisteći iz iste. &#10;VAŽNO!!! Uređaje ne pokušavajte da popravljate sami, niti da ih iz bilo kog razloga otvarate ili rasklapate!&#10;U slučaju bilo kakvog problema sa bilo kojim delom sistema, kvara ili loma, obratite se direktno proizvođaču ili vašem lokalnom predstavniku od kog ste nabavili uređaj. Bežični uređaji iz sistema VoiceToys sadrže punjive litijum-jonske baterije, koje u slučaju pogrešnog rukavanja mogu izazvati požar! Ne izlažite ih visokim temperaturama niti direktnoj sunčevoj svetlosti! Uređaji ne smeju doći u kontakt s vodom!&#10;Odlaganje i reciklaža&#10;Kućišta uređaja su napravljen od PET-G plastike, aluminijuma i klirita. Sadrže i razne elektronske komponente i litijum-jonske baterije. U slučaju kraja životnog ciklusa, nemojte ih bacati u komunalni otpad, već se obratite vašem lokalnom reciklažnom centru ili direktno proizvođaču uređaja." style="width:916.000px;height:534.519px;"/></span></p><div style="position:absolute;left:53.031px;top:199.692px;width:916.000px;height:534.519px;"><div style="position:absolute;left:4.000px;top:4.000px;width:431.300px;height:527.000px;"><p class="p3 p9" style="position:absolute;left:0;top:0;">VoiceToys uređaje nemojte davati deci na samostalno </p><p class="p3 p9" style="position:absolute;left:0;top:24.200px;">korišćenje!</p><p class="p3 c3" style="position:absolute;left:0;top:68.400px;">Svi VoiceToys uređaji su napravljeni od neškodljivih </p><p class="p3 c3" style="position:absolute;left:0;top:92.600px;">materijala i bez oštrih ivica kako bi se minimizovala </p><p class="p3 c3" style="position:absolute;left:0;top:116.800px;">opasnost od povreda. Uređaji su namenjeni da njima </p><p class="p3 c3" style="position:absolute;left:0;top:141.000px;">rukuju terapeuti. Osim uređaja Vibe<span style="display:inline-block;width:9.135px;height:13.011px;"/>, koji proizvodi </p><p class="p3 c3" style="position:absolute;left:0;top:165.200px;">vibracije i namenjen je da ga korisnik dodiruje, ostale </p><p class="p3 c3" style="position:absolute;left:0;top:189.400px;">uređajte nemojte davati korisnicima u ruke kako bi se </p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">izbegla slučajna oštećenja. Posebno obratite pažnju na </p><p class="p3 c3" style="position:absolute;left:0;top:237.800px;">zvučnike iz sistema Space<span style="display:inline-block;width:10.000px;height:14.242px;"/>, jer su njihove emitujuće </p><p class="p3 c3" style="position:absolute;left:0;top:262.000px;">površine napravljene od mekanog drveta. Hvatajte ih i </p><p class="p3 c3" style="position:absolute;left:0;top:286.200px;">držite isključivo za plastični deo! </p><p class="p3 p9" style="position:absolute;left:0;top:330.400px;">Napomena o sigurnosti i odgovornosti korisnika</p><p class="p3 c3" style="position:absolute;left:0;top:374.600px;">Ovo uputstvo je namenjeno da vam pomogne u pravilnoj i </p><p class="p3 c3" style="position:absolute;left:0;top:398.800px;">sigurnoj upotrebi ovog elektronskog uređaja. Pre </p><p class="p3 c3" style="position:absolute;left:0;top:423.000px;">korišćenja uređaja, pažljivo pročitajte ovo uputstvo i </p><p class="p3 c3" style="position:absolute;left:0;top:447.200px;">pridržavajte se svih navedenih smernica. Proizvođač ne </p><p class="p3 c3" style="position:absolute;left:0;top:471.400px;">snosi odgovornost za nepropisnu upotrebu uređaja ili </p><p class="p3 c3" style="position:absolute;left:0;top:495.600px;">posledice koje mogu proisteći iz iste. </p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:258.112px;top:144.133px;width:9.135px;height:13.011px;"><img src="images/uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysg.png" alt="uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png" style="width:9.135px;height:13.011px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:185.552px;top:239.702px;width:10.000px;height:14.242px;"><img src="images/uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysg.png" alt="uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png" style="width:10.000px;height:14.242px;"/></span></p></div><div style="position:absolute;left:480.700px;top:4.000px;width:431.300px;height:527.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4 c5">VAŽNO!!!</span><span class="c6"> </span><span class="c4 c5">Uređaje</span><span class="c4 c7"> </span><span class="c4 c5">ne pokušavajte da popravljate sami, </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c4 c5">niti da ih iz bilo kog razloga otvarate ili rasklapate!</span></p><p class="p3 c1" style="position:absolute;left:0;top:68.400px;"><span class="c4">U slučaju bilo kakvog problema sa bilo kojim delom </span></p><p class="p3" style="position:absolute;left:0;top:92.600px;">sistema, kvara ili loma, obratite se direktno proizvođaču ili </p><p class="p3" style="position:absolute;left:0;top:116.800px;">vašem lokalnom predstavniku od kog ste nabavili uređaj. </p><p class="p10 c8" style="position:absolute;left:0;top:141.000px;">Bežični uređaji iz sistema VoiceToys sadrže punjive </p><p class="p10 c8" style="position:absolute;left:0;top:165.200px;">litijum-jonske baterije, koje u slučaju pogrešnog </p><p class="p3 c1" style="position:absolute;left:0;top:189.400px;"><span class="c4 c8">rukavanja mogu izazvati požar!</span><span class="c4"> Ne izlažite ih visokim </span></p><p class="p3" style="position:absolute;left:0;top:213.600px;">temperaturama niti direktnoj sunčevoj svetlosti! Uređaji ne </p><p class="p3" style="position:absolute;left:0;top:237.800px;">smeju doći u kontakt s vodom!</p><p class="p3 p9" style="position:absolute;left:0;top:282.000px;">Odlaganje i reciklaža</p><p class="p3" style="position:absolute;left:0;top:326.200px;">Kućišta uređaja su napravljen od PET-G plastike, </p><p class="p3" style="position:absolute;left:0;top:350.400px;">aluminijuma i klirita. Sadrže i razne elektronske </p><p class="p3" style="position:absolute;left:0;top:374.600px;">komponente i litijum-jonske baterije. U slučaju kraja </p><p class="p3" style="position:absolute;left:0;top:398.800px;">životnog ciklusa, nemojte ih bacati u komunalni otpad, već </p><p class="p3" style="position:absolute;left:0;top:423.000px;">se obratite vašem lokalnom reciklažnom centru ili direktno </p><p class="p3" style="position:absolute;left:0;top:447.200px;">proizvođaču uređaja.</p></div></div></div></body></html>
