cKnJJvgswgzWS_4OYsQ.png  je sada spreman za rad.&#10;Ukoliko logotip  uLWsW4yrGE5r-oCDSWZis7kXSnivjKQZahyG9aH0Ch6qi7y8FWfTKhbDQygxkpJjvI7xwPVTB0KXi6ftvj5p7qLqW9_c79JAx0U3O2dSL2QYwO_C95GfoRf_NVy6GWXqvnYgKo1lfMmkxoA3oUpc1igFyxWir8HzHysgs8kBsgJecN_CWD8xeoecKnJJvgswgzWS_4OYsQ.png  promeni boju u žuto, to znači da je baterija oslabila, a ukoliko počne da treperi crveno, baterija je na kritično niskom nivou i treba je odmah napuniti. Stanje baterija možete kontrolisati i pomoću mobilne aplikacije.&#10;Na donjoj strani uređaja se takođe nalaze i tri otvora za ulaz zvuka u unutrašnjost uređaja. Ne pokrivajte ih i ne stavljajte uređaj na meku površinu koja može apsorbovati zvuk!" style="width:478.716px;height:593.530px;"/></span></p><div style="position:absolute;left:53.919px;top:115.966px;width:478.716px;height:593.530px;"><p class="p3 p9 c1" style="position:absolute;left:4.000px;top:4.000px;"><span class="c4">2 - 1: Opis uređaja</span><span class="c6"> </span><span class="c4">i bezbednosne napomene</span></p><p class="p3 p9 c1" style="position:absolute;left:4.000px;top:48.200px;"><span class="c6">Vibe</span><span style="display:inline-block;width:9.135px;height:13.011px;"/><span class="c6"> je vibrotaktilna, svetleća kutija, namenjena za stimulaciju </span></p><p class="p3 c3" style="position:absolute;left:4.000px;top:72.400px;">glasanja i kontrolu visine i intenziteta glasa. Iako je namenjena </p><p class="p3 p9 c1" style="position:absolute;left:4.000px;top:96.600px;"><span class="c6">da se pomoću nje osete vibracije, </span><span class="c4">ne sme se davati deci na </span></p><p class="p3 p9 c1" style="position:absolute;left:4.000px;top:120.800px;"><span class="c4">samostalno rukovanje! </span><span class="c6">Detaljna podešavanja uređaja se vrše </span></p><p class="p3 p9 c1" style="position:absolute;left:4.000px;top:145.000px;"><span class="c6">putem mobilne aplikacije VoiceToys.</span></p><p class="p3 p9" style="position:absolute;left:4.000px;top:189.200px;">2 - 2: Puštanje uređaja u rad</p><p class="p3 c3" style="position:absolute;left:4.000px;top:233.400px;">Uređaj se pokreće se stavljanjem prekidača koji se nalazi sa </p><p class="p3 c3" style="position:absolute;left:4.000px;top:257.600px;">donje strane uređaja u poziciju 1. Nakon uključivanja, logotip <span style="display:inline-block;width:9.135px;height:13.011px;"/> </p><p class="p3 c3" style="position:absolute;left:4.000px;top:281.800px;">na kućištu počinje da sija, LED svetlo sa gornje strane prikaže </p><p class="p3 c3" style="position:absolute;left:4.000px;top:306.000px;">animaciju svetlima i uređaj na kratko zavibrira. Ovaj efekat se </p><p class="p3 c3" style="position:absolute;left:4.000px;top:330.200px;">može isključiti putem mobilne aplikacije, što je objašnjeno u </p><p class="p3 c3" style="position:absolute;left:4.000px;top:354.400px;">sledećem poglavlju. Vaš uređaj Vibe<span style="display:inline-block;width:9.135px;height:13.011px;"/> je sada spreman za rad.</p><p class="p3 c3" style="position:absolute;left:4.000px;top:398.600px;">Ukoliko logotip <span style="display:inline-block;width:11.000px;height:15.667px;"/> promeni boju u žuto, to znači da je baterija </p><p class="p3 c3" style="position:absolute;left:4.000px;top:422.800px;">oslabila, a ukoliko počne da treperi crveno, baterija je na kritično </p><p class="p3 c3" style="position:absolute;left:4.000px;top:447.000px;">niskom nivou i treba je odmah napuniti. Stanje baterija možete </p><p class="p3 c3" style="position:absolute;left:4.000px;top:471.200px;">kontrolisati i pomoću mobilne aplikacije.</p><p class="p3 c3" style="position:absolute;left:4.000px;top:515.400px;">Na donjoj strani uređaja se takođe nalaze i tri otvora za ulaz </p><p class="p3 c3" style="position:absolute;left:4.000px;top:539.600px;">zvuka u unutrašnjost uređaja. Ne pokrivajte ih i ne stavljajte </p><p class="p3 c3" style="position:absolute;left:4.000px;top:563.800px;">uređaj na meku površinu koja može apsorbovati zvuk!</p><p style="fon
