a&quot;. Pojaviće se ekran prikazan na strani 27, u čijem gornjem crvenom polju možete videti naziv uređaja i tastere za informacije o sistemu i pomoć. Funkcija i način korišćenja ovih tastera su opisani na strani 26.&#10;U sredini ekrana aplikacije se nalaze slike koje identifikuju trenutni režim rada uređaja (leva) i način prikaza svetlosnog panela (desna slika). Izgled ovog dela ekrana možete videti na donjoj slici.&#10;&#10;&#10;&#10;&#10;&#10;Leva slika na ekranu prikazuje režim rada uređaja koji je označen rečju &quot;Mikrofon&quot; i odgovarajućim simbolom, sve dok nije uključen senzor udaljenosti. Sa ovim postavkama svetlosni panel reaguje na zvuk. Kada se senzor udaljenosti uključi, svetlosni panel prestaje da reaguje na zvuk i reaguje samo na promenu distance između senzora i objekta, a na ekranu aplikacije je napisano &quot;Udaljenost&quot; i odgovarajući simbol. Kada se senzor udaljenosti isključi aplikacija i sve njene funkcije, kao i svetlosni panel, automatski se vraćaju u režim &quot;Mikrofon&quot;, odnosno ponovo reaguju na zvuk.&#10;Desna slika koja se nalazi u sredini ekrana aplikacije prikazuje trenutni izgled svetlosnog panela. Kada dodirnete sliku, otvara se prozor (slika dole) u kom možete promeniti izgled svetlosnog panela prema ponuđenim opcijama, na način koji je opisan na sledećoj strani.&#10;&#10;&#10;&#10;&#10;&#10;" style="width:925.773px;height:606.803px;"/></span></p><div style="position:absolute;left:53.000px;top:94.000px;width:925.773px;height:606.803px;"><div style="position:absolute;left:4.000px;top:4.000px;width:435.942px;height:599.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c4">4-4-1: </span><span class="c6">Nakon što ste pritiskom na taster </span><span class="c4">&quot;REŽIM&quot;</span><span class="c6"> ušli u </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">meni za izbor režima rada uređaja,</span><span class="c4"> </span><span class="c4 c14">režim vizuelne </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:48.400px;"><span class="c4 c14">identifikacije nivoa zvuka i udaljenosti</span><span class="c4"> </span><span class="c6">birate pritiskom na </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:72.600px;"><span class="c6">taster </span><span class="c4">&quot;Reakcija&quot;</span><span class="c6">. Pojaviće se ekran prikazan na strani 27, u </span></p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">čijem gornjem crvenom polju možete videti naziv uređaja i </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">tastere za informacije o sistemu i pomoć. Funkcija i način </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">korišćenja ovih tastera su opisani na strani 26.</p><p class="p3 c3" style="position:absolute;left:0;top:189.400px;">U sredini ekrana aplikacije se nalaze slike koje identifikuju </p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">trenutni režim rada uređaja (leva) i način prikaza svetlosnog </p><p class="p3 c3" style="position:absolute;left:0;top:237.800px;">panela (desna slika). Izgled ovog dela ekrana možete videti </p><p class="p3 c3" style="position:absolute;left:0;top:262.000px;">na donjoj slici.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:306.200px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:350.400px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:394.600px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:438.800px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:483.000px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:527.200px;"><span class="c4 c14 underline">Leva slika</span><span class="c6"> na ekranu prikazuje režim rada uređaja koji je </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:551.400px;"><span class="c6">označen rečju </span><span class="c4">&quot;Mikrofon&quot;</span><span class="c6"> i odgovarajućim simbolom, sve </span></p><p class="p3 c3" style="position:absolute;left:0;top:575.600px;">dok nije uključen senzor udaljenosti. Sa ovim postavkama </p></div><div style="position:absolute;left:485.831px;top:4.000px;width:435.942px;height:599.000px;"><p class="p3 c3" style="position:absolute;left:0;top:0;">svetlosni panel reaguje na zvuk. Kada se senzor udaljenosti </p><p class="p3 p9 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">uključi, svetlosni panel </span><span class="c4 c14">prestaje da reaguje na zvuk</span><span class="c6"> i reaguje </span></p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">samo na promenu distance između senzora i objekta, a na </p><p class="p3 p9 c1" style="position:absolute;left:0;top:72.600px;"><span class="c6">ekranu aplikacije je napisano </span><span class="c4">&quot;Udaljenost&quot;</span><span class="c6"> i odgovarajući </span></p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">simbol. Kada se senzor udaljenosti isključi aplikacija i sve </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">njene funkcije, kao i svetlosni panel, automatski se vraćaju u </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">režim &quot;Mikrofon&quot;, odnosno ponovo reaguju na zvuk.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:189.400px;"><span class="c4 c14 underline">Desna slika</span><span class="c6"> koja se nalazi u sredini ekrana aplikacije </span></p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">prikazuje trenutni izgled svetlosnog panela. Kada dodirnete </p><p class="p3 c3" style="position:absolute;left:0;top:237.800px;">sliku, otvara se prozor (slika dole) u kom možete promeniti </p><p class="p3 c3" style="position:absolute;left:0;top:262.000px;">izgled svetlosnog panela prema ponuđenim opcijama, na </p><p class="p3 p9 c1" style="position:absolute;left:0;top:286.200px;"><span class="c6">način koji je opisan na sledećoj strani.</span></p><p class="p3 c1" style="position:absolute;left:0;top:330.400px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:374.600px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:418.800px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:463.000px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:507.200px;"> </p></div></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:624.114px;top:454.105px;width:268.000px;height:201.375px;filter:drop-shadow(1.000px 2.000px 3.000px rgba(0,0,0,0.600));"><img src="images/screenshots/sr/JumpY_izaberite_ekran.jpg" alt="JumpY izaberite ekran.jpg" style="width:268.000px;height:201.375px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:130.000px;top:407.205px;width:295.859px;height:193.688px;filter:drop-shadow(1.000px 2.000px 3.000px rgba(0,0,0,0.600));"><img src="images/screenshots/sr/JumpY_mikrofon-1.jpg" alt="JumpY mikrofon.jpg" style="width:295.859px;height:193.688px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:888.124px;top:50.333px;width:82.180px;height:27.096px;"><img src="images/JumpYAsset_2.png" alt="JumpYAsset 2.svg" style="width:82.180px;height:27.096px;"/></span></p></div></body></html>
