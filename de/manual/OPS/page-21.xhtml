<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>21 Page 21 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="789D51B1-0926-40D3-86E5-25F47E9A322F"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.919px;top:107.966px;width:916.000px;height:585.000px;"><img src="images/image-75.png" alt="U levom uglu donjeg plavog polja aplikacije se nalazi taster &quot;Preseti&quot;. Pritiskom na ovaj taster donji deo ekrana aplikacije izgleda kao na slici desno.… U levom uglu donjeg plavog polja aplikacije se nalazi taster &quot;Preseti&quot;. Pritiskom na ovaj taster donji deo ekrana aplikacije izgleda kao na slici desno.&#10;&#10;U ovakvom izgledu donjeg dela ekrana aplikacije se nalaze dve kartice, sa nazivima &quot;Podrazumevani&quot; i &quot;Korisnički&quot;.&#10;&#10;Pod karticom &quot;Podrazumevani&quot; se nalaze postavke rada koje su unapred kreirane. Svaka od ovih postavki je zapamćena pod određenim imenom koje predstavlja opis načina rada sistema kada se aktivira izabrana postavka.&#10;&#10;Pod karticom &quot;Korisnički&quot; se nalaze postavke koje ste zapamtili. Način pamćenja postavki koje ste kreirali je sledeći:&#10;&#10;U slučaju da ste vršili izmenu bilo kog od ponuđenih parametara,  svoja podešavanja možete zapamtiti pritiskom na taster      koji se nalazi u gornjem delu ekrana. Na ekranu će se pojaviti tastatura. Upišite ime za kreirano podešavanje i sačuvajte.&#10;Vaša zapamćena podešavanja možete pronaći pritiskom na taster &quot;Preseti&quot; koji se nalazi u levom uglu donjeg plavog polja ekrana aplikacije, a zatim na karticu &quot;Korisnički&quot;. Prikazaće se sva podešavanja koja ste do sada zapamtili. Jednostavno kliknite na neki od tastera sa imenom zapamćenog podešavanja i sistem će  odmah preuzeti ta podešavanja i dalje raditi po njima.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg plavog polja ekrana aplikacije." style="width:916.000px;height:585.000px;"/></span></p><div style="position:absolute;left:53.919px;top:107.966px;width:916.000px;height:585.000px;"><div style="position:absolute;left:4.000px;top:4.000px;width:431.300px;height:577.000px;"><p class="p3 c1" style="position:absolute;left:0;top:0;"><span class="c6">U levom uglu donjeg plavog polja aplikacije se nalazi </span></p><p class="p3 c1" style="position:absolute;left:0;top:24.200px;"><span class="c6">taster </span><span class="c4 c8">&quot;Preseti&quot;</span><span class="c6">. Pritiskom na ovaj taster donji deo ekrana </span></p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">aplikacije izgleda kao na slici desno.</p><p class="p3 c1" style="position:absolute;left:0;top:72.600px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:96.800px;"><span class="c6">U ovakvom izgledu donjeg dela ekrana aplikacije se nalaze </span></p><p class="p3 c1" style="position:absolute;left:0;top:121.000px;"><span class="c6">dve kartice, sa nazivima </span><span class="c4 c8">&quot;Podrazumevani&quot;</span><span class="c6"> i </span><span class="c4 c8">&quot;Korisnički&quot;</span><span class="c6">.</span></p><p class="p3 c1" style="position:absolute;left:0;top:145.200px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:169.400px;"><span class="c6">Pod karticom </span><span class="c4 c8">&quot;Podrazumevani&quot;</span><span class="c6"> se nalaze postavke rada </span></p><p class="p3 c3" style="position:absolute;left:0;top:193.600px;">koje su unapred kreirane. Svaka od ovih postavki je </p><p class="p3 c3" style="position:absolute;left:0;top:217.800px;">zapamćena pod određenim imenom koje predstavlja opis </p><p class="p3 c3" style="position:absolute;left:0;top:242.000px;">načina rada sistema kada se aktivira izabrana postavka.</p><p class="p3 c1" style="position:absolute;left:0;top:266.200px;"> </p><p class="p3 c1" style="position:absolute;left:0;top:290.400px;"><span class="c6">Pod karticom </span><span class="c4 c8">&quot;Korisnički&quot;</span><span class="c6"> se nalaze postavke koje ste </span></p><p class="p3 c3" style="position:absolute;left:0;top:314.600px;">zapamtili. Način pamćenja postavki koje ste kreirali je </p><p class="p3 c3" style="position:absolute;left:0;top:338.800px;">sledeći:</p><p class="p3 c1" style="position:absolute;left:0;top:363.000px;"> </p><p class="p3 p9 c1" style="position:absolute;left:0;top:387.200px;"><span class="c6">U slučaju da ste vršili izmenu bilo kog od ponuđenih </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:411.400px;"><span class="c6">parametara,  </span><span class="c4 c13">svoja</span><span class="c6"> </span><span class="c4 c13">podešavanja možete zapamtiti</span><span class="c6"> </span></p><p class="p3 c3" style="position:absolute;left:0;top:435.600px;">pritiskom na taster      koji se nalazi u gornjem delu ekrana. </p><p class="p3 c3" style="position:absolute;left:0;top:459.800px;">Na ekranu će se pojaviti tastatura. Upišite ime za kreirano </p><p class="p3 c3" style="position:absolute;left:0;top:484.000px;">podešavanje i sačuvajte.</p><p class="p3 p9 c1" style="position:absolute;left:0;top:528.200px;"><span class="c6">Vaša zapamćena podešavanja možete pronaći pritiskom na </span></p><p class="p3 p9 c1" style="position:absolute;left:0;top:552.400px;"><span class="c6">taster </span><span class="c4">&quot;Preseti&quot;</span><span class="c6"> koji se nalazi u levom uglu donjeg plavog </span></p></div><div style="position:absolute;left:480.700px;top:4.000px;width:431.300px;height:577.000px;"><p class="p3 p9 c1" style="position:absolute;left:0;top:0;"><span class="c6">polja ekrana aplikacije, a zatim na karticu </span><span class="c4">&quot;Korisnički&quot;</span><span class="c6">. </span></p><p class="p3 c3" style="position:absolute;left:0;top:24.200px;">Prikazaće se sva </p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">podešavanja koja ste do </p><p class="p3 c3" style="position:absolute;left:0;top:72.600px;">sada zapamtili. </p><p class="p3 c3" style="position:absolute;left:0;top:96.800px;">Jednostavno kliknite na </p><p class="p3 c3" style="position:absolute;left:0;top:121.000px;">neki od tastera sa </p><p class="p3 c3" style="position:absolute;left:0;top:145.200px;">imenom zapamćenog </p><p class="p3 c3" style="position:absolute;left:0;top:169.400px;">podešavanja i sistem će  </p><p class="p3 c3" style="position:absolute;left:0;top:193.600px;">odmah preuzeti ta </p><p class="p3 c3" style="position:absolute;left:0;top:217.800px;">podešavanja i dalje raditi </p><p class="p3 c3" style="position:absolute;left:0;top:242.000px;">po njima.</p><p class="p3 c1" style="position:absolute;left:0;top:286.200px;"><span class="c4">Uvek se možete vratiti na </span></p><p class="p3" style="position:absolute;left:0;top:310.400px;">početni ekran </p><p class="p3 c1" style="position:absolute;left:0;top:334.600px;"><span class="c4 c8">&quot;VoiceToys&quot;</span><span class="c4"> aplikacije </span></p><p class="p3" style="position:absolute;left:0;top:358.800px;">pritiskom na taster sa </p><p class="p3" style="position:absolute;left:0;top:383.000px;">slikom kućice, koji se </p><p class="p3" style="position:absolute;left:0;top:407.200px;">nalazi u sredini donjeg </p><p class="p3" style="position:absolute;left:0;top:431.400px;">plavog polja ekrana </p><p class="p3" style="position:absolute;left:0;top:455.600px;">aplikacije.</p></div></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.031px;top:47.000px;width:916.000px;height:47.225px;"><img src="images/image-28.png" alt="režim mikrofon: podešavanja režim mikrofon: podešavanja" style="width:916.000px;height:47.225px;"/></span></p><div style="position:absolute;left:53.031px;top:47.000px;width:916.000px;height:47.225px;"><span style="display:inline-block;position:absolute;left:2.000px;top:2.000px;width:912.000px;height:38.000px;"><img src="images/border-image-2.png" alt="border-image-2.png" style="position:absolute;left:0;top:0;width:912.000px;height:38.000px;"/></span><p class="p8 c1" style="position:absolute;left:4.000px;top:4.000px;"><span class="c17">režim mikrofon:</span><span class="c15"> podešavanja</span></p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:737.000px;top:643.000px;width:232.000px;height:49.000px;"><img src="images/image-76.png" alt="Prikaz ekrana nakon pritiska na taster &quot;Preseti&quot; Prikaz ekrana nakon pritiska na taster &quot;Preseti&quot;" style="width:232.000px;height:49.000px;"/></span></p><div style="position:absolute;left:737.000px;top:643.000px;width:232.000px;height:49.000px;"><p class="p3 p20" style="position:absolute;left:19.911px;top:5.000px;">Prikaz ekrana nakon pritiska na </p><p class="p3 p20" style="position:absolute;left:70.101px;top:25.900px;">taster &quot;Preseti&quot;</p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:738.084px;top:146.885px;width:230.916px;height:488.344px;filter:drop-shadow(1.000px 2.000px 3.000px rgba(0,0,0,0.600));"><img src="images/screenshots/sr/SpreadY_preseti.jpg" alt="SpreadY preseti.jpg" style="width:230.916px;height:488.344px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:196.576px;top:549.687px;width:18.404px;height:18.040px;"><img src="images/Screenshot_2024-04-30_at_19_38_07.png" alt="Screenshot 2024-04-30 at 19.38.07.png" style="width:18.404px;height:18.040px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:866.573px;top:49.063px;width:92.938px;height:25.513px;"><img
