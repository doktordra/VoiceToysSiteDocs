 podešava parametrom opisanim na prethodnoj strani.&#10;Pritiskom na taster  SpreadY memorija 1.jpg  pokrećete novu igru sa istim parametrima koji su prethodno zadati. &#10;Pritiskom na taster  SpreadY memorija 2.jpg  ponavljate prethodnu igru, sa istim zadatim parametrima. &#10;Ukoliko želite da promenite parametre, pritiskom na taster  SpreadY memorija 2.jpg  će se pojaviti klizači za kontrolu parametara igre. Njih možete ukloniti ponovnim pritiskom na isti taster." style="width:914.000px;height:590.139px;"/></span></p><div style="position:absolute;left:53.031px;top:99.861px;width:914.000px;height:590.139px;"><div style="position:absolute;left:4.000px;top:4.000px;width:430.350px;height:582.000px;"><p class="p3 c3" style="position:absolute;left:0;top:0;">Igru pokrećete pritiskom na taster <span style="display:inline-block;width:25.000px;height:24.000px;"/>. Stubići će početi da </p><p class="p3 c3" style="position:absolute;left:0;top:32.042px;">se pale, a na ekranu će se prikazivati šema po kojoj su se </p><p class="p3 c3" style="position:absolute;left:0;top:56.242px;">palili. Izgled ovog ekrana je prikazan na slici desno.</p><p class="p3 c3" style="position:absolute;left:0;top:100.442px;">Brojevi u levoj koloni označavaju broj serije paljenja </p><p class="p3 c3" style="position:absolute;left:0;top:124.642px;">stubića. U ovom primeru igra je bila ograničena na 5 serija. </p><p class="p3 c3" style="position:absolute;left:0;top:148.842px;">Brojevi desnoj koloni označavaju koliko stubića je bilo </p><p class="p3 c3" style="position:absolute;left:0;top:173.042px;">upaljeno u toj seriji. U ovom primeru u prvoj seriji su bila </p><p class="p3 c3" style="position:absolute;left:0;top:197.242px;">upaljena 3 stubića, u drugoj takođe 3, u trećoj 2, a u </p><p class="p3 c3" style="position:absolute;left:0;top:221.442px;">četvrtoj i petoj po jedan. </p><p class="p3 c3" style="position:absolute;left:0;top:265.642px;">Brojevi u donjem redu označavaju koliko stubića određene </p>
