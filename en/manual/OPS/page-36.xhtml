<html xml:lang="en" xmlns="http://www.w3.org/1999/xhtml"><head><title>36 Page 36 | Uputstvo Voice Toys V5</title><link rel="stylesheet" href="css/book.css" type="text/css"/><script src="js/book.js"/><meta charset="UTF-8"/><meta name="EPB-UUID" content="789D51B1-0926-40D3-86E5-25F47E9A322F"/><meta name="viewport" content="width=1023.84,height=768.24"/></head><body dir="ltr" onload="Body_onLoad()"><div class="body" style="white-space:pre; line-break:strict;"><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.031px;top:46.635px;width:916.000px;height:47.225px;"><img src="images/image-28.png" alt="režim: reakcija - senzor udaljenosti režim: reakcija - senzor udaljenosti" style="width:916.000px;height:47.225px;"/></span></p><div style="position:absolute;left:53.031px;top:46.635px;width:916.000px;height:47.225px;"><span style="display:inline-block;position:absolute;left:2.000px;top:2.000px;width:912.000px;height:38.000px;"><img src="images/border-image-2.png" alt="border-image-2.png" style="position:absolute;left:0;top:0;width:912.000px;height:38.000px;"/></span><p class="p8 c1" style="position:absolute;left:4.000px;top:4.000px;"><span class="c17">režim:</span><span class="c15"> reakcija - senzor udaljenosti</span></p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:53.000px;top:107.000px;width:925.773px;height:562.000px;"><img src="images/image-122.png" alt="Nakon što uključite senzor udaljenosti on će se automatski povezati sa svetlosnim panelom, a ekran aplikacije će izgledati kao na slici desno. Detaljno podešavanje njegovih funkcija je opisano na prethodnoj strani.… Nakon što uključite senzor udaljenosti on će se automatski povezati sa svetlosnim panelom, a ekran aplikacije će izgledati kao na slici desno. Detaljno podešavanje njegovih funkcija je opisano na prethodnoj strani.&#10;Senzor distance uključite nakon što ga postavite na maksimalnu distancu od objekta od kog želite da merite udaljenost. U trenutnku uključenja, senzor meri početnu udaljenost, i sve promene udaljenosti se prikazuju u odnosu na nju.&#10;Postavite ga tako da strana senzora na kojoj se nalaze okrugli otvori bude usmerena ka objektu od kog se meri udaljenost. Na primer: ukoliko senzor udaljenosti postavljate ispod trambuline, dva okrugla otvora koja se nalaze na njemu treba da budu usmerena na gore, kao što je prikazano na slici. &#10;Na ekranu aplikacije možete videti stanje napunjenosti baterije koja se nalazi u senzoru udaljenosti. Nemojte čekati da se baterija potpuno isprazni, nego je napunite priključivanjem USB-C kabla na za to predviđeno mesto koje je na slici dole označeno strelicom.&#10;Uvek se možete vratiti na početni ekran &quot;VoiceToys&quot; aplikacije pritiskom na taster sa slikom kućice, koji se nalazi u sredini donjeg crvenog polja ekrana aplikacije.&#10;&#10;" style="width:925.773px;height:562.000px;"/></span></p><div style="position:absolute;left:53.000px;top:107.000px;width:925.773px;height:562.000px;"><div style="position:absolute;left:4.000px;top:4.000px;width:435.942px;height:554.000px;"><p class="p3 c3" style="position:absolute;left:0;top:0;">Nakon što uključite senzor udaljenosti on će se automatski </p><p class="p3 c3" style="position:absolute;left:0;top:24.200px;">povezati sa svetlosnim panelom, a ekran aplikacije će </p><p class="p3 c3" style="position:absolute;left:0;top:48.400px;">izgledati kao na slici desno. Detaljno podešavanje njegovih </p><p class="p3 c3" style="position:absolute;left:0;top:72.600px;">funkcija je opisano na prethodnoj strani.</p><p class="p3 c3" style="position:absolute;left:0;top:116.800px;">Senzor distance uključite nakon što ga postavite na </p><p class="p3 c3" style="position:absolute;left:0;top:141.000px;">maksimalnu distancu od objekta od kog želite da merite </p><p class="p3 c3" style="position:absolute;left:0;top:165.200px;">udaljenost. U trenutnku uključenja, senzor meri početnu </p><p class="p3 c3" style="position:absolute;left:0;top:189.400px;">udaljenost, i sve promene udaljenosti se prikazuju u odnosu </p><p class="p3 c3" style="position:absolute;left:0;top:213.600px;">na nju.</p><p class="p3 c3" style="position:absolute;left:0;top:257.800px;">Postavite ga tako da strana senzora na kojoj se nalaze </p><p class="p3 c3" style="position:absolute;left:0;top:282.000px;">okrugli otvori bude usmerena ka objektu od kog se meri </p><p class="p3 c3" style="position:absolute;left:0;top:306.200px;">udaljenost. Na primer: ukoliko senzor udaljenosti </p><p class="p3 c3" style="position:absolute;left:0;top:330.400px;">postavljate ispod trambuline, dva okrugla otvora koja se </p><p class="p3 c3" style="position:absolute;left:0;top:354.600px;">nalaze na njemu treba da budu usmerena na gore, kao što </p><p class="p3 c3" style="position:absolute;left:0;top:378.800px;">je prikazano na slici. </p><p class="p3 c3" style="position:absolute;left:0;top:423.000px;">Na ekranu aplikacije možete videti stanje napunjenosti </p><p class="p3 c3" style="position:absolute;left:0;top:447.200px;">baterije koja se nalazi u senzoru udaljenosti. Nemojte </p><p class="p3 c3" style="position:absolute;left:0;top:471.400px;">čekati da se baterija potpuno isprazni, nego je napunite </p><p class="p3 c3" style="position:absolute;left:0;top:495.600px;">priključivanjem USB-C kabla na za to predviđeno mesto </p><p class="p3 c3" style="position:absolute;left:0;top:519.800px;">koje je na slici dole označeno strelicom.</p></div><div style="position:absolute;left:485.831px;top:4.000px;width:435.942px;height:554.000px;"><p class="p3 c1" style="position:absolute;left:0;top:0;"><span class="c4">Uvek se možete vratiti na </span></p><p class="p3 c1" style="position:absolute;left:0;top:24.200px;"><span class="c4">početni ekran </span><span class="c4 c8">&quot;VoiceToys&quot;</span><span class="c4"> </span></p><p class="p3" style="position:absolute;left:0;top:48.400px;">aplikacije pritiskom na </p><p class="p3" style="position:absolute;left:0;top:72.600px;">taster sa slikom kućice, koji </p><p class="p3" style="position:absolute;left:0;top:96.800px;">se nalazi u sredini donjeg </p><p class="p3" style="position:absolute;left:0;top:121.000px;">crvenog polja ekrana </p><p class="p3 c1" style="position:absolute;left:0;top:145.200px;"><span class="c4">aplikacije.</span></p><p class="p3 c1" style="position:absolute;left:0;top:169.400px;"> </p></div></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:755.140px;top:137.000px;width:213.875px;height:453.067px;filter:drop-shadow(1.000px 2.000px 3.000px rgba(0,0,0,0.600));"><img src="images/screenshots/sr/JumpY_senzor.jpg" alt="JumpY senzor.jpg" style="width:213.875px;height:453.067px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:755.000px;top:628.000px;width:214.000px;height:47.000px;"><img src="images/image-123.png" alt="Prikaz ekrana nakon uključivanja senzora udaljenosti Prikaz ekrana nakon uključivanja senzora udaljenosti" style="width:214.000px;height:47.000px;"/></span></p><div style="position:absolute;left:755.000px;top:628.000px;width:214.000px;height:47.000px;"><p class="p3 p20" style="position:absolute;left:6.256px;top:4.000px;">Prikaz ekrana nakon uključivanja </p><p class="p3 p20" style="position:absolute;left:45.953px;top:24.900px;">senzora udaljenosti</p></div><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:459.267px;top:477.781px;width:278.819px;height:214.219px;"><img src="images/senzor-removebg-preview-1.png" alt="senzor-removebg-preview.png" style="width:278.819px;height:214.219px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:396.257px;top:651.500px;width:137.182px;height:35.513px;"><img src="images/image-124.png" alt="Arrow Arrow" style="width:137.182px;height:35.513px;"/></span></p><p style="font-size:1px;"><span style="display:inline-block;position:absolute;left:533.
